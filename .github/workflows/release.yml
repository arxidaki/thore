name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - run: npm run build

      - name: Stage artifacts
        shell: pwsh
        run: |
          $v = "${{ github.ref_name }}"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item src-tauri/target/release/thore.exe "artifacts/thore-$v-windows-x64-portable.exe"
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
