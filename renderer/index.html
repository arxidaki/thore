<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' wss://data.raspberryshake.org https://data.raspberryshake.org;">
  <title>Thore · Cyprus Seismic Network</title>
  <link rel="stylesheet" href="seismo.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="shell">
    <main id="dash-grid" class="dash-grid">
      <section class="card map-card">
        <div class="map-wrap">
          <canvas id="map-canvas"></canvas>
          <div class="map-status" title="stream state · reporting stations · last update (UTC)">
            <span id="stream-dot" class="status-dot"></span>
            <span id="stream-label">starting…</span>
            <span id="status-line" class="status-line"></span>
          </div>
        </div>
      </section>
    </main>
  </div>

  <svg id="link-lines" class="link-lines"></svg>
  <div id="tooltip" class="tooltip hidden"></div>

  <script src="miniseed.js"></script>
  <script src="fdsn.js"></script>
  <script src="dsp.js"></script>
  <script src="map.js"></script>
  <script src="caps.js"></script>
  <script src="seismo.js"></script>
</body>
</html>
